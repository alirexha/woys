# Minimal CI — review F-19-04.
#
# Before this workflow every gate in the project notes (ruff, format, mypy --strict,
# pytest, shellcheck) was honor-system manual; the cross-examination found
# that absence is *why* so many other findings accumulated unobserved.
#
# This pipeline enforces the exact commands the project notes documents. It does not
# attempt GPU/PipeWire/loopback coverage — those tests carry the `slow`,
# `gpu`, `pipewire`, `audio_loopback`, `real_audio` markers and are excluded
# by `-m "not slow"`. Certifying the hardware path is F-merged-034, not this.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --frozen --extra dev
      - name: ruff check
        run: uv run ruff check src/ scripts/ tests/
      - name: ruff format --check
        run: uv run ruff format --check src/ scripts/ tests/
      - name: mypy --strict
        run: uv run mypy --strict src/woys/ src/audio/ src/tui/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --frozen --extra dev
      # System libs the hermetic tests depend on transitively:
      #   pulseaudio-utils -> provides `pactl` binary on disk so
      #     chain._pactl()'s `shutil.which("pactl")` pre-check passes
      #     and the test-level mocks of subprocess.run actually fire
      #     (the pre-check short-circuits before subprocess.run otherwise).
      #   libportaudio2    -> provides libportaudio.so so `import
      #     sounddevice` succeeds in tests that exercise code paths
      #     containing the import statement without actually using audio.
      # Neither package starts a daemon, so PipeWire-marker tests still
      # auto-skip via conftest's _has_pipewire() / _has_gpu() checks.
      - name: install audio system libs for hermetic tests
        run: sudo apt-get update && sudo apt-get install -y pulseaudio-utils libportaudio2
      - name: pytest (fast — hardware-gated tests are `slow`-marked and skipped)
        run: uv run pytest -m "not slow"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # shellcheck is preinstalled on ubuntu-latest runners. `-S error` keeps
      # this gate minimal — error-level only; the warning-level installer
      # hardening sweep is a separate workstream (F-19-07/10/12-17).
      - name: shellcheck installers
        run: shellcheck -S error install.sh uninstall.sh

  deps-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      # requirements.txt must be the exact `uv pip compile` output of
      # pyproject.toml. F-merged-004 (commit-029) regenerated the file
      # after F-merged-029 (commit-027) made hatch read the version
      # dynamically; this gate keeps it that way. `uv python install 3.11`
      # above pins the resolver to the project's floor Python so the
      # output is deterministic — without it, the runner's default Python
      # (3.12+) pulls in `setuptools` via torch's `python_full_version >=
      # '3.12'` marker, diverging from the committed requirements.txt.
      - name: requirements.txt is in sync with pyproject.toml
        run: |
          uv pip compile pyproject.toml -o requirements.txt --quiet
          git diff --exit-code requirements.txt

  version-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # F-merged-029: keep src/woys/__init__.py::__version__ in sync with
      # the documentation surfaces that historically drifted (README.md
      # "## Status (vX.Y.Z)" header, pkg/PKGBUILD pkgver=). Run
      # `python scripts/release.py` after bumping __init__.py to make this
      # green; the gate fails the build otherwise.
      - name: version drift across user-facing surfaces
        run: bash scripts/check_version_drift.sh
